<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chart Renderer — Visual Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A0E17; color: #E8ECF1; font-family: Inter, system-ui, sans-serif; display: flex; height: 100vh; }
    #sidebar { width: 240px; padding: 16px; background: #131926; border-right: 1px solid #2A3040; overflow-y: auto; flex-shrink: 0; }
    #main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
    #chart-canvas { display: block; }
    .control-group { margin-bottom: 16px; }
    .control-group label { display: block; font-size: 11px; color: #8892A4; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .control-group select, .control-group input[type=range] { width: 100%; background: #0F1420; border: 1px solid #2A3040; color: #E8ECF1; padding: 4px 8px; border-radius: 4px; font-size: 13px; }
    .checkbox-group { display: flex; flex-direction: column; gap: 4px; }
    .checkbox-group label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #E8ECF1; text-transform: none; letter-spacing: 0; }
    .checkbox-group input[type=checkbox] { width: auto; }
    h2 { font-size: 13px; color: #6C8EEF; margin-bottom: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    #size-value { font-size: 11px; color: #8892A4; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "@astro-app/shared-types": "../../../../node_modules/@astro-app/shared-types/dist/index.js"
    }
  }
  </script>
</head>
<body>
  <div id="sidebar">
    <h2>Chart Renderer</h2>

    <div class="control-group">
      <label>Theme</label>
      <select id="theme-select">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
    </div>

    <div class="control-group">
      <label>Size — <span id="size-value">600px</span></label>
      <input type="range" id="size-slider" min="300" max="1200" value="600" step="50">
    </div>

    <div class="control-group">
      <label>Layers</label>
      <div class="checkbox-group">
        <label><input type="checkbox" id="layer-background" checked> Background</label>
        <label><input type="checkbox" id="layer-zodiac" checked> Zodiac Ring</label>
        <label><input type="checkbox" id="layer-houses" checked> House Overlay</label>
        <label><input type="checkbox" id="layer-aspects" checked> Aspect Web</label>
        <label><input type="checkbox" id="layer-planets" checked> Planet Ring</label>
        <label><input type="checkbox" id="layer-labels" checked> Degree Labels</label>
      </div>
    </div>

    <div class="control-group">
      <button id="export-svg" style="width:100%;background:#6C8EEF;color:#fff;border:none;padding:8px 12px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;">Export SVG</button>
    </div>
  </div>

  <div id="main">
    <canvas id="chart-canvas"></canvas>
  </div>

  <script type="module">
    import { renderRadix, renderRadixToSvg } from "../../dist/index.js";
    import { darkTheme, lightTheme } from "../../dist/themes/index.js";
    import { STELLIUM_CHART } from "../../dist/test-data/stellium-chart.js";

    const canvas = document.getElementById("chart-canvas");
    const themeSelect = document.getElementById("theme-select");
    const sizeSlider = document.getElementById("size-slider");
    const sizeValue = document.getElementById("size-value");

    const layerCheckboxes = {
      background: document.getElementById("layer-background"),
      zodiacRing: document.getElementById("layer-zodiac"),
      houseOverlay: document.getElementById("layer-houses"),
      aspectWeb: document.getElementById("layer-aspects"),
      planetRing: document.getElementById("layer-planets"),
      degreeLabels: document.getElementById("layer-labels"),
    };

    function render() {
      const size = parseInt(sizeSlider.value, 10);
      sizeValue.textContent = size + "px";
      canvas.style.width = size + "px";
      canvas.style.height = size + "px";

      const theme = themeSelect.value === "dark" ? darkTheme : lightTheme;
      const layers = {};
      for (const [key, cb] of Object.entries(layerCheckboxes)) {
        layers[key] = cb.checked;
      }

      document.body.style.background = theme.background;

      renderRadix({
        data: STELLIUM_CHART,
        theme,
        canvas,
        layers,
        padding: 24,
      });
    }

    themeSelect.addEventListener("change", render);
    sizeSlider.addEventListener("input", render);
    for (const cb of Object.values(layerCheckboxes)) {
      cb.addEventListener("change", render);
    }

    document.getElementById("export-svg").addEventListener("click", () => {
      const size = parseInt(sizeSlider.value);
      const theme = themeSelect.value === "dark" ? darkTheme : lightTheme;
      const svg = renderRadixToSvg(STELLIUM_CHART, theme, size, size);
      const blob = new Blob([svg], { type: "image/svg+xml" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "chart.svg";
      a.click();
      URL.revokeObjectURL(url);
    });

    render();
  </script>
</body>
</html>
