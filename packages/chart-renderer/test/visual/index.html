<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chart Renderer — Visual Test Harness</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A0E17; color: #E8ECF1; font-family: Inter, system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }
    #sidebar { width: 220px; padding: 16px; background: #131926; border-right: 1px solid #2A3040; overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; gap: 16px; }
    #main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; overflow: auto; }
    #chart-canvas { display: block; }
    .group-label { font-size: 10px; color: #6C8EEF; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin-bottom: 6px; }
    select, input[type=range] { width: 100%; background: #0F1420; border: 1px solid #2A3040; color: #E8ECF1; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    select:focus, input:focus { outline: 1px solid #6C8EEF; }
    .checkbox-list { display: flex; flex-direction: column; gap: 5px; }
    .checkbox-list label { display: flex; align-items: center; gap: 7px; font-size: 12px; cursor: pointer; }
    .checkbox-list input[type=checkbox] { width: 14px; height: 14px; accent-color: #6C8EEF; }
    .size-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; font-size: 12px; }
    .size-row span { color: #8892A4; }
    button { width: 100%; background: #6C8EEF; color: #fff; border: none; padding: 7px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
    button:hover { background: #8BA5F5; }
    #chart-info { font-size: 10px; color: #565E6C; margin-top: 2px; }
    hr { border: none; border-top: 1px solid #2A3040; }
  </style>
</head>
<body>
  <div id="sidebar">
    <div>
      <div class="group-label">Render Mode</div>
      <select id="mode-select">
        <option value="radix">Radix (single wheel)</option>
        <option value="biwheel">Bi-wheel (natal + transit)</option>
      </select>
    </div>

    <hr>

    <div>
      <div class="group-label">Inner / Natal Chart</div>
      <select id="chart-select">
        <option value="stellium">Stellium — Nov 1978</option>
        <option value="transit">Transit — Jan 2025</option>
        <option value="allRetrograde">All Retrograde (Nov 1978)</option>
      </select>
      <div id="chart-info"></div>
    </div>

    <div id="biwheel-row" style="display:none">
      <div class="group-label">Outer / Transit Chart</div>
      <select id="outer-chart-select">
        <option value="transit">Transit — Jan 2025</option>
        <option value="stellium">Stellium — Nov 1978</option>
        <option value="allRetrograde">All Retrograde (Nov 1978)</option>
      </select>
    </div>

    <hr>

    <div>
      <div class="group-label">Theme</div>
      <select id="theme-select">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
    </div>

    <div>
      <div class="size-row">
        <div class="group-label" style="margin:0">Size</div>
        <span id="size-value">600px</span>
      </div>
      <input type="range" id="size-slider" min="300" max="1200" value="600" step="50">
    </div>

    <hr>

    <div>
      <div class="group-label">Layers (radix only)</div>
      <div class="checkbox-list">
        <label><input type="checkbox" id="layer-background" checked> Background</label>
        <label><input type="checkbox" id="layer-zodiac" checked> Zodiac Ring</label>
        <label><input type="checkbox" id="layer-houses" checked> House Overlay</label>
        <label><input type="checkbox" id="layer-aspects" checked> Aspect Web</label>
        <label><input type="checkbox" id="layer-planets" checked> Planet Ring</label>
        <label><input type="checkbox" id="layer-labels" checked> Degree Labels</label>
      </div>
    </div>

    <hr>

    <div>
      <button id="export-svg">Export SVG</button>
    </div>
  </div>

  <div id="main">
    <canvas id="chart-canvas"></canvas>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
